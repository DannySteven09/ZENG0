<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sistema de Inventario - Office Depot</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- SheetJS for Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'od-red': '#C8102E',
            'od-red-dark': '#A00D24',
            'od-red-light': '#E8132F',
          }
        }
      }
    }
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    
    /* Glassmorphism effect */
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-light {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* Loading spinner */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #C8102E;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 5px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #C8102E;
      border-radius: 5px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #A00D24;
    }
    
    /* Result card animation */
    .result-card {
      transition: all 0.3s ease;
    }
    
    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(200, 16, 46, 0.15);
    }
    
    /* Table styles for inventory */
    .inventory-table {
      border-collapse: separate;
      border-spacing: 0;
    }
    
    .inventory-table th {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .inventory-table tbody tr {
      transition: all 0.2s ease;
    }
    
    .inventory-table tbody tr:hover {
      background: rgba(200, 16, 46, 0.05) !important;
    }
    
    /* Ubicacion inputs */
    .ubicacion-input-group {
      transition: all 0.3s ease;
    }
    
    .ubicacion-input-group:focus-within {
      transform: scale(1.02);
    }
    
    /* File upload area */
    .upload-area {
      transition: all 0.3s ease;
    }
    
    .upload-area:hover {
      transform: scale(1.02);
      border-color: #C8102E;
    }
    
    /* Pulse animation for buttons */
    .pulse-btn {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(200, 16, 46, 0.4);
      }
      50% {
        box-shadow: 0 0 0 15px rgba(200, 16, 46, 0);
      }
    }

    /* Input focus effects */
    .input-glow:focus {
      box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.2);
    }
    
    /* Footer styles */
    .footer-link {
      transition: color 0.2s ease;
    }
    .footer-link:hover {
      color: #C8102E;
    }
    .social-icon {
      transition: all 0.2s ease;
    }
    .social-icon:hover {
      transform: translateY(-3px);
    }
    
    /* Login background */
    .login-bg {
      background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?ixlib=rb-4.0.3&auto=format&fit=crop&w=2069&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    .login-overlay {
      background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.7) 100%);
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
      <div class="loader"></div>

  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = Motion;

    // ========== FOOTER COMPONENT ==========
    const Footer = () => {
      return (
        <footer className="bg-gray-100 mt-auto">
          {/* Main Footer Content */}
          <div className="container mx-auto px-4 md:px-6 py-8 md:py-12">
            {/* Logo and Contact */}
            <div className="flex flex-col md:flex-row items-center justify-between mb-8 pb-8 border-b border-gray-300">
              <div className="flex items-center mb-4 md:mb-0">
                <div className="flex items-center">
                  <span className="text-2xl font-bold text-od-red">Office</span>
                  <span className="text-2xl font-bold text-gray-800 ml-1">DEPOT</span>
                </div>
              </div>
              <div className="flex flex-col md:flex-row items-center gap-4 text-sm text-gray-600">
                <a href="mailto:sclientescr@officedepot.co.cr" className="flex items-center gap-2 footer-link">
                  <i className="fas fa-envelope text-od-red"></i>

                </a>
                <span className="hidden md:inline text-gray-400">|</span>
                <span className="flex items-center gap-2">
                  <i className="fas fa-phone text-od-red"></i>
                  Asesoría * 2208 4000
                </span>
                <span className="hidden md:inline text-gray-400">|</span>
                <span>Pedidos y cotizaciones * 800 9100000</span>
              </div>
            </div>
            
            {/* Footer Links Grid */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8 mb-8">
              {/* Herramientas de consulta */}
              <div>
                <h4 className="font-bold text-gray-800 mb-4 flex items-center">
                  <span className="w-1 h-5 bg-od-red mr-2"></span>
                  Herramientas de consulta
                </h4>
                <ul className="space-y-2 text-sm text-gray-600">
                  <li><a href="#" className="footer-link">¿Buscas alguna tienda?</a></li>
                  <li><a href="#" className="footer-link">Encuentra ofertas cerca de ti</a></li>
                  <li><a href="#" className="footer-link">Folleto del mes</a></li>
                </ul>
              </div>
              
              {/* Información legal */}
              <div>
                <h4 className="font-bold text-gray-800 mb-4 flex items-center">
                  <span className="w-1 h-5 bg-od-red mr-2"></span>
                  Información legal
                </h4>
                <ul className="space-y-2 text-sm text-gray-600">
                  <li><a href="#" className="footer-link">Términos y Condiciones de Uso del Portal</a></li>
                  <li><a href="#" className="footer-link">Aviso de privacidad</a></li>
                </ul>
              </div>
              
              {/* Nosotros te ayudamos */}
              <div>
                <h4 className="font-bold text-gray-800 mb-4 flex items-center">
                  <span className="w-1 h-5 bg-od-red mr-2"></span>
                  Nosotros te ayudamos
                </h4>
                <ul className="space-y-2 text-sm text-gray-600">
                  <li><a href="#" className="footer-link">Extra cobertura</a></li>
                  <li><a href="#" className="footer-link">Información de entrega</a></li>
                  <li><a href="#" className="footer-link">Política de precios bajos</a></li>
                </ul>
              </div>
              
              {/* Conoce Office Depot */}
              <div>
                <h4 className="font-bold text-gray-800 mb-4 flex items-center">
                  <span className="w-1 h-5 bg-od-red mr-2"></span>
                  Conoce Office Depot
                </h4>
                <ul className="space-y-2 text-sm text-gray-600">
                  <li><a href="#" className="footer-link">Misión, valores, promesa y propósito</a></li>
                  <li><a href="#" className="footer-link">Acerca de Office Depot</a></li>
                  <li><a href="#" className="footer-link">Green Depot</a></li>
                </ul>
              </div>
            </div>
            
            {/* Company Info */}
            <div className="text-center text-sm text-gray-600 mb-6">
              <p className="font-semibold text-gray-800">ERIAL BQ, S.A</p>
              <p>Cédula jurídica: 3101295184</p>
              <p>Dirección: Carretera Interamericana, San José, San Pedro, 11501, Costa Rica</p>
              <p>San Pedro, Montes de Oca</p>
              <p>PBX: +506 2234-9890</p>
            </div>
            
            {/* Social Icons and Certifications */}
            <div className="flex flex-col md:flex-row items-center justify-between pt-6 border-t border-gray-300">
              <div className="flex items-center gap-4 mb-4 md:mb-0">
                <a href="#" className="social-icon text-gray-600 hover:text-gray-900 text-xl">
                  <i className="fab fa-tiktok"></i>
                </a>
                <a href="#" className="social-icon text-gray-600 hover:text-blue-600 text-xl">
                  <i className="fab fa-linkedin-in"></i>
                </a>
                <a href="#" className="social-icon text-gray-600 hover:text-blue-700 text-xl">
                  <i className="fab fa-facebook-f"></i>
                </a>
                <a href="#" className="social-icon text-gray-600 hover:text-gray-900 text-xl">
                  <i className="fab fa-x-twitter"></i>
                </a>
                <a href="#" className="social-icon text-gray-600 hover:text-pink-600 text-xl">
                  <i className="fab fa-instagram"></i>
                </a>
              </div>
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center">
                  <i className="fas fa-shield-halved text-green-600 text-xl"></i>
                </div>
                <div className="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center">
                  <i className="fas fa-certificate text-blue-600 text-xl"></i>
                </div>
              </div>
            </div>
          </div>
          
          {/* Copyright Bar */}
          <div className="bg-od-red text-white py-3 px-4">
            <div className="container mx-auto text-center text-xs md:text-sm">
              Copyright ©2025 por Office Depot de México, S.A. de C.V. Todos los derechos reservados. OFFICE DEPOT® es una marca registrada propiedad de Office Depot Inc.
            </div>
          </div>
        </footer>
      );
    };

    // ========== LOGIN VIEW ==========
    const LoginView = ({ onLogin }) => {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");

      const handleSubmit = (e) => {
        e.preventDefault();
        if (username && password) {
          onLogin(username);
        }
      };

      return (
        <div className="relative min-h-screen login-bg">
          {/* Dark Overlay */}
          <div className="absolute inset-0 login-overlay"></div>
          
          {/* Content */}
          <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
            {/* Login Form */}
            <motion.div
              initial={{ scale: 0.8, opacity: 0 }}
              animate={{ scale: 1, opacity: 1 }}
              transition={{ duration: 0.5 }}
              className="glass-dark rounded-3xl p-8 md:p-12 w-full max-w-md shadow-2xl border border-white/10"
            >
              <div className="text-center mb-8">
                <motion.div
                  initial={{ y: -20 }}
                  animate={{ y: 0 }}
                  transition={{ delay: 0.2, type: "spring" }}
                  className="w-20 h-20 bg-gradient-to-r from-od-red to-od-red-dark rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"
                >
                  <i className="fas fa-warehouse text-white text-3xl"></i>
                </motion.div>
                <h1 className="text-3xl md:text-4xl font-bold text-white mb-2">
                  Sistema de Inventario
                </h1>
                <p className="text-gray-300">Office Depot Corporate</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-6">
                <motion.div
                  initial={{ x: -50, opacity: 0 }}
                  animate={{ x: 0, opacity: 1 }}
                  transition={{ delay: 0.3 }}
                >
                  <label className="block text-white text-sm font-semibold mb-2">
                    <i className="fas fa-user mr-2"></i>Usuario
                  </label>
                  <input
                    type="text"
                    value={username}
                    onChange={(e) => setUsername(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-od-red focus:border-transparent transition-all"
                    placeholder="Ingresa tu usuario"
                    required
                  />
                </motion.div>

                <motion.div
                  initial={{ x: -50, opacity: 0 }}
                  animate={{ x: 0, opacity: 1 }}
                  transition={{ delay: 0.4 }}
                >
                  <label className="block text-white text-sm font-semibold mb-2">
                    <i className="fas fa-lock mr-2"></i>Contraseña
                  </label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-od-red focus:border-transparent transition-all"
                    placeholder="Ingresa tu contraseña"
                    required
                  />

                <motion.button
                  initial={{ y: 20, opacity: 0 }}
                  animate={{ y: 0, opacity: 1 }}
                  transition={{ delay: 0.5 }}
                  whileHover={{ scale: 1.02 }}
                  whileTap={{ scale: 0.98 }}
                  type="submit"
                  className="w-full py-4 bg-gradient-to-r from-od-red to-od-red-dark text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all"
                >
                  <i className="fas fa-sign-in-alt mr-2"></i>Ingresar

              {/* Branding */}
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                transition={{ delay: 0.6 }}
                className="mt-8 pt-6 border-t border-white/10 text-center"
              >
                <div className="flex items-center justify-center gap-2">

      );
    };

    // ========== DASHBOARD VIEW ==========
    const DashboardView = ({ onNavigate, onLogout, userName }) => {
      const [currentSlide, setCurrentSlide] = useState(0);

      const categories = [
        { 
          name: "Tecnología", 
          icon: "fa-laptop", 
          color: "from-slate-800 to-slate-900",
          bgImage: "https://images.unsplash.com/photo-1531297484001-80022131f5a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=2020&q=80",
          description: "Equipos y dispositivos tecnológicos"
        },
        { 
          name: "Mobiliario", 
          icon: "fa-chair", 
          color: "from-amber-800 to-amber-900",
          bgImage: "https://images.unsplash.com/photo-1497366216548-37526070297c?ixlib=rb-4.0.3&auto=format&fit=crop&w=2069&q=80",
          description: "Muebles y equipamiento de oficina"
        },
      ];

      useEffect(() => {
        const interval = setInterval(() => {
          setCurrentSlide((prev) => (prev + 1) % categories.length);
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="min-h-screen flex flex-col bg-gradient-to-br from-gray-50 via-white to-gray-100">
          {/* Header */}
          <motion.header
            initial={{ y: -100 }}
            animate={{ y: 0 }}
            className="bg-gradient-to-r from-od-red to-od-red-dark text-white shadow-2xl"
          >
            <div className="container mx-auto px-4 md:px-6 py-4 md:py-5 flex items-center justify-between">
              <div className="flex items-center space-x-3 md:space-x-4">
                <div className="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center">
                  <i className="fas fa-warehouse text-od-red text-xl md:text-2xl"></i>
                </div>
                <div>
                  <h1 className="text-lg md:text-2xl font-bold">Sistema de Inventario</h1>
                  <p className="text-xs md:text-sm text-red-100">Office Depot Corporate</p>
                </div>
              </div>
              
              {/* User Info and Logout */}
              <div className="flex items-center space-x-3 md:space-x-4">
                {/* User Avatar and Name */}
                <div className="flex items-center space-x-2 md:space-x-3 bg-white/10 rounded-xl px-3 py-2">
                  <div className="w-8 h-8 md:w-10 md:h-10 bg-white rounded-full flex items-center justify-center overflow-hidden">
                    <img 
                      src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" 
                      alt="Usuario"
                      className="w-full h-full object-cover"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.nextSibling.style.display = 'flex';
                      }}
                    />
                    <div className="hidden w-full h-full items-center justify-center bg-gray-200">
                      <i className="fas fa-user text-gray-500"></i>
                    </div>
                  </div>
                  <span className="hidden sm:block text-sm md:text-base font-medium">{userName}</span>
                </div>
                
                <button
                  onClick={onLogout}
                  className="px-4 md:px-6 py-2 bg-white/20 hover:bg-white hover:text-od-red rounded-xl font-semibold transition-all border border-white/30 text-sm md:text-base"
                >
                  <i className="fas fa-sign-out-alt mr-1 md:mr-2"></i>
                  <span className="hidden sm:inline">Salir</span>
                </button>
              </div>
            </div>
          </motion.header>

          <div className="container mx-auto px-4 md:px-6 py-8 md:py-12 flex-grow">
            {/* Carousel with Background Images */}
            <motion.div
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              className="mb-8 md:mb-12 relative h-56 md:h-72 rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl"
            >
              <AnimatePresence mode="wait">
                <motion.div
                  key={currentSlide}
                  initial={{ opacity: 0, scale: 1.1 }}
                  animate={{ opacity: 1, scale: 1 }}
                  exit={{ opacity: 0, scale: 0.95 }}
                  transition={{ duration: 0.7 }}
                  className="absolute inset-0"
                >
                  {/* Background Image */}
                  <div 
                    className="absolute inset-0 bg-cover bg-center"
                    style={{ 
                      backgroundImage: `url(${categories[currentSlide].bgImage})`,
                    }}
                  />
                  {/* Overlay */}
                  <div className={`absolute inset-0 bg-gradient-to-r ${categories[currentSlide].color} opacity-70`}></div>
                  
                  {/* Content */}
                  <div className="relative h-full flex items-center justify-center">
                    <div className="text-center text-white px-4">
                      <motion.div
                        initial={{ scale: 0, rotate: -180 }}
                        animate={{ scale: 1, rotate: 0 }}
                        transition={{ delay: 0.2, type: "spring", stiffness: 200 }}
                        className="w-20 h-20 md:w-24 md:h-24 bg-white/20 backdrop-blur-sm rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30"
                      >
                        <i className={`fas ${categories[currentSlide].icon} text-4xl md:text-5xl`}></i>
                      </motion.div>
                      <motion.h2 
                        initial={{ y: 20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ delay: 0.3 }}
                        className="text-3xl md:text-5xl font-bold mb-2"
                      >
                        {categories[currentSlide].name}
                      </motion.h2>
                      <motion.p
                        initial={{ y: 20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ delay: 0.4 }}
                        className="text-white/80 text-sm md:text-lg"
                      >
                        {categories[currentSlide].description}
                      </motion.p>
                    </div>
                  </div>
                </motion.div>
              </AnimatePresence>

              {/* Dots */}
              <div className="absolute bottom-4 left-0 right-0 flex justify-center space-x-2">
                {categories.map((_, index) => (
                  <button
                    key={index}
                    onClick={() => setCurrentSlide(index)}
                    className={`h-2 md:h-3 rounded-full transition-all duration-300 ${
                      index === currentSlide 
                        ? "bg-white w-8 md:w-10" 
                        : "bg-white/50 w-2 md:w-3 hover:bg-white/70"
                    }`}
                  />
                ))}
              </div>
            </motion.div>

            {/* Navigation Cards */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
              <motion.div
                initial={{ opacity: 0, x: -50 }}
                animate={{ opacity: 1, x: 0 }}
                transition={{ delay: 0.2 }}
                whileHover={{ scale: 1.03, y: -5 }}
                whileTap={{ scale: 0.98 }}
                onClick={() => onNavigate("scanner")}
                className="cursor-pointer bg-white rounded-2xl md:rounded-3xl shadow-xl p-8 md:p-12 hover:shadow-2xl transition-all border-4 border-transparent hover:border-od-red"
              >
                <div className="text-center">
                  <div className="w-20 h-20 md:w-24 md:h-24 bg-gradient-to-br from-od-red to-od-red-dark rounded-2xl flex items-center justify-center mx-auto mb-4 md:mb-6 shadow-lg">
                    <i className="fas fa-search text-white text-3xl md:text-4xl"></i>
                  </div>
                  <h3 className="text-2xl md:text-3xl font-bold text-gray-800 mb-2 md:mb-3">
                    Búsqueda
                  </h3>

    // ========== SCANNER VIEW (BÚSQUEDA) ==========

      const fileInputRef = useRef(null);

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        setIsLoading(true);
        setFileName(file.name);

        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', defval: '' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { 
              header: 1, 
              defval: '', 
              blankrows: false 
            });
            
            processExcelData(jsonData);
          } catch (error) {
            console.error('Error procesando archivo:', error);
            alert('Error al procesar el archivo Excel');
            setIsLoading(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const processExcelData = (data) => {
        try {
          if (data.length < 2) throw new Error('Archivo sin datos suficientes');

          const rows = data.slice(1);
          
          const columnMap = {
            upc: 0,
            sku: 2,
            descripcion: 3,
            estatus: 6,
            tipo: 7,
            existencia: 8,
            precio: 9
          };

          const products = [];
          rows.forEach(row => {
            const getVal = (index) => row[index] ? String(row[index]).trim() : '';
            const getPriceVal = (index) => {
              const val = row[index];
              return typeof val === 'number' ? val : parseFloat(String(val).replace(/[^0-9.]/g, '')) || 0;
            };

            const product = {
              upc: getVal(columnMap.upc),
              sku: getVal(columnMap.sku),
              descripcion: getVal(columnMap.descripcion),
              estatus: getVal(columnMap.estatus),
              tipo: getVal(columnMap.tipo),
              existencia: getVal(columnMap.existencia) || '0',
              precio: getPriceVal(columnMap.precio)
            };

            if (product.upc || product.sku || product.descripcion) {
              products.push(product);
            }
          });

          setProductData(products);
          setTimeout(() => {
            setIsLoading(false);
            setFileLoaded(true);
          }, 500);

          console.error('Error procesando datos:', error);

          product.upc.toLowerCase().includes(term) ||
          product.sku.toLowerCase().includes(term) ||
          product.descripcion.toLowerCase().includes(term)
        );
        
        setSearchResults(filtered);
      };

      const formatPrice = (precio) => {
        if (!precio || precio === 0) return 'N/A';
        try {
          return new Intl.NumberFormat('es-CR', {
            style: 'currency',
            currency: 'CRC',
            minimumFractionDigits: 0
          }).format(precio);
        } catch (error) {
          return `₡${precio.toLocaleString()}`;
        }
      };

    // ========== INVENTORY VIEW (CÍCLICO) ==========
    const InventoryView = ({ onBack, onLogout, userName }) => {
      const [fileLoaded, setFileLoaded] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [fileName, setFileName] = useState("");
      const [inventoryData, setInventoryData] = useState([]);
      const [filteredData, setFilteredData] = useState([]);
      const [searchTerm, setSearchTerm] = useState("");
      const [hasChanges, setHasChanges] = useState(false);
      const [darkMode, setDarkMode] = useState(false);
      const fileInputRef = useRef(null);
      const workbookRef = useRef(null);

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        setIsLoading(true);
        setFileName(file.name);

        const reader = new FileReader();
        reader.onload = async function(e) {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', defval: '' });
            workbookRef.current = workbook;
            
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '', blankrows: false });
            
            if (jsonData.length > 0) {
              const rows = jsonData.slice(1);
              
              // Mismo mapeo de columnas que el scanner
              const columnMap = {
                upc: 0,
                sku: 2,
                descripcion: 3,
                existencia: 8,
                precio: 9
              };

              const processedData = rows.map((row, index) => {
                const getVal = (idx) => row[idx] ? String(row[idx]).trim() : '';
                const getPriceVal = (idx) => {
                  const val = row[idx];
                  return typeof val === 'number' ? val : parseFloat(String(val).replace(/[^0-9.]/g, '')) || 0;
                };

                return {
                  id: index,
                  upc: getVal(columnMap.upc),
                  sku: getVal(columnMap.sku),
                  descripcion: getVal(columnMap.descripcion),
                  existencia: getVal(columnMap.existencia) || '0',
                  precio: getPriceVal(columnMap.precio),
                  ubicaciones: [{ cantidad: '', ubicacion: '' }],
                  total: 0,
                  diferencia: 0
                };
              }).filter(item => item.upc || item.sku || item.descripcion);
              
              setInventoryData(processedData);
              setFilteredData(processedData);
              
              setTimeout(() => {
                setIsLoading(false);
                setFileLoaded(true);
              }, 500);
            }
          } catch (error) {
            console.error('Error:', error);
            alert('Error al procesar el archivo Excel');
            setIsLoading(false);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const formatPrice = (precio) => {
        if (!precio || precio === 0) return 'N/A';
        try {
          return new Intl.NumberFormat('es-CR', {
            style: 'currency',
            currency: 'CRC',
            minimumFractionDigits: 0
          }).format(precio);
        } catch (error) {
          return `₡${precio.toLocaleString()}`;
        }
      };

      const handleSearch = (value) => {
        setSearchTerm(value);
        if (!value.trim()) {
          setFilteredData(inventoryData);
          return;
        }
        
        const term = value.toLowerCase();
        const filtered = inventoryData.filter(item =>
          item.upc.toString().toLowerCase().includes(term) ||
          item.sku.toString().toLowerCase().includes(term) ||
          item.descripcion.toLowerCase().includes(term)
        );
        setFilteredData(filtered);
      };

      const addUbicacion = (itemId) => {
        setInventoryData(prev => prev.map(item => {
          if (item.id === itemId) {
            return {
              ...item,
              ubicaciones: [...item.ubicaciones, { cantidad: '', ubicacion: '' }]
            };
          }
          return item;
        }));
        setFilteredData(prev => prev.map(item => {
          if (item.id === itemId) {
            return {
              ...item,
              ubicaciones: [...item.ubicaciones, { cantidad: '', ubicacion: '' }]
            };
          }
          return item;
        }));
        setHasChanges(true);
      };

      const removeUbicacion = (itemId, index) => {
        const updateItem = (item) => {
          if (item.id !== itemId) return item;
          
          let newUbicaciones;
          if (item.ubicaciones.length > 1) {
            newUbicaciones = item.ubicaciones.filter((_, i) => i !== index);
          } else {
            newUbicaciones = [{ cantidad: '', ubicacion: '' }];
          }
          
          const newTotal = newUbicaciones.reduce((sum, ub) => {
            const cant = parseFloat(ub.cantidad) || 0;
            return sum + cant;
          }, 0);
          
          return {
            ...item,
            ubicaciones: newUbicaciones,
            total: newTotal,
            diferencia: newTotal - parseFloat(item.existencia)
          };
        };
        
        setInventoryData(prev => prev.map(updateItem));
        setFilteredData(prev => prev.map(updateItem));
        setHasChanges(true);
      };

      const updateUbicacion = (itemId, index, field, value) => {
        const updateItem = (item) => {
          if (item.id !== itemId) return item;
          
          const newUbicaciones = [...item.ubicaciones];
          newUbicaciones[index] = {
            ...newUbicaciones[index],
            [field]: value
          };
          
          const newTotal = newUbicaciones.reduce((sum, ub) => {
            const cant = parseFloat(ub.cantidad) || 0;
            return sum + cant;
          }, 0);
          
          return {
            ...item,
            ubicaciones: newUbicaciones,
            total: newTotal,
            diferencia: newTotal - parseFloat(item.existencia)
          };
        };
        
        setInventoryData(prev => prev.map(updateItem));
        setFilteredData(prev => prev.map(updateItem));
        setHasChanges(true);
      };

      const exportExcel = () => {
        try {
          const exportHeaders = ['UPC', 'SKU', 'DESCRIPCIÓN', 'EXISTENCIA', 'PRECIO', 'UBICACIONES_DETALLE', 'TOTAL_CONTADO', 'DIFERENCIA'];
          const exportData = [exportHeaders];
          
          inventoryData.forEach(item => {
            const ubicacionesStr = item.ubicaciones
              .filter(ub => ub.cantidad || ub.ubicacion)
              .map(ub => `${ub.cantidad || 0}@${ub.ubicacion || ''}`)
              .join('; ');
              
            exportData.push([
              item.upc,
              item.sku,
              item.descripcion,
              item.existencia,
              item.precio,
              ubicacionesStr,
              item.total,
              item.diferencia
            ]);
          });

          const newWorksheet = XLSX.utils.aoa_to_sheet(exportData);
          const newWorkbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, 'Inventario_Contado');

          const wbout = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'array' });
          const blob = new Blob([wbout], { type: 'application/octet-stream' });
          
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `inventario_contado_${new Date().toISOString().split('T')[0]}.xlsx`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          setHasChanges(false);
          alert('Archivo exportado exitosamente');
        } catch (error) {
          console.error('Error al exportar:', error);
          alert('Error al exportar el archivo');
        }
      };

      const getDiferenciaColor = (diff) => {
        if (diff > 0) return darkMode ? "text-green-400" : "text-green-600";
        if (diff < 0) return darkMode ? "text-red-400" : "text-red-600";
        return darkMode ? "text-gray-400" : "text-gray-500";
      };

      const formatDiferencia = (diff) => {
        if (diff > 0) return `+${diff}`;
        return diff.toString();
      };

      // Vista de carga de archivo
      if (!fileLoaded) {
        return (
          <div className="relative min-h-screen login-bg">
            <div className="absolute inset-0 login-overlay"></div>

            {/* Back button */}
            <motion.button
              initial={{ opacity: 0, x: -20 }}
              animate={{ opacity: 1, x: 0 }}
              onClick={onBack}
              className="absolute top-4 left-4 md:top-6 md:left-6 z-20 px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-white font-semibold transition-all flex items-center backdrop-blur-sm"
            >
              <i className="fas fa-arrow-left mr-2"></i>Volver
            </motion.button>

            <div className="relative z-10 min-h-screen flex items-center justify-center p-4">
              {/* Upload Form */}
              <motion.div
                initial={{ scale: 0.8, opacity: 0 }}
                animate={{ scale: 1, opacity: 1 }}
                transition={{ duration: 0.5 }}
                className="glass-dark rounded-3xl p-8 md:p-12 w-full max-w-2xl shadow-2xl border border-white/10"
              >
                <div className="text-center mb-8">
                  <motion.div
                    initial={{ y: -20 }}
                    animate={{ y: 0 }}
                    transition={{ delay: 0.2, type: "spring" }}
                    className="w-20 h-20 bg-gradient-to-r from-od-red to-od-red-dark rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"
                  >
                    <i className="fas fa-clipboard-list text-white text-3xl"></i>
                  </motion.div>
                  <h1 className="text-2xl md:text-3xl font-bold text-white mb-2" style={{fontFamily: 'Inter, sans-serif'}}>
                    Conteo Cíclico
                  </h1>
                  <p className="text-gray-300" style={{fontFamily: 'Inter, sans-serif'}}>Carga tu archivo de inventario para comenzar el conteo</p>
                </div>

                <motion.div
                  initial={{ y: 20, opacity: 0 }}
                  animate={{ y: 0, opacity: 1 }}
                  transition={{ delay: 0.3 }}
                  className="glass rounded-2xl p-6 mb-6"
                >
                  <input
                    type="file"
                    ref={fileInputRef}
                    accept=".xlsx,.xls"
                    onChange={handleFileUpload}
                    className="hidden"
                  />
                  
                  {isLoading ? (
                    <div className="text-center py-4">
                      <div className="loader mx-auto mb-4"></div>
                      <p className="text-white font-medium" style={{fontFamily: 'Inter, sans-serif'}}>Procesando archivo...</p>
                      <p className="text-gray-400 text-sm mt-2" style={{fontFamily: 'Inter, sans-serif'}}>{fileName}</p>
                    </div>
                  ) : (
                    <motion.div
                      whileHover={{ scale: 1.02 }}
                      whileTap={{ scale: 0.98 }}
                      onClick={() => fileInputRef.current.click()}
                      className="upload-area border-2 border-dashed border-white/30 rounded-xl p-8 cursor-pointer text-center hover:border-od-red transition-all"
                    >
                      <i className="fas fa-file-excel text-5xl text-white/80 mb-4"></i>
                      <p className="text-white font-semibold mb-2" style={{fontFamily: 'Inter, sans-serif'}}>Seleccionar Archivo Excel</p>
                      <p className="text-gray-400 text-sm" style={{fontFamily: 'Inter, sans-serif'}}>.xlsx o .xls</p>
                    </motion.div>
                  )}
                </motion.div>

                {/* Estructura requerida */}
                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 0.5 }}
                  className="glass rounded-xl p-4 overflow-x-auto"
                >
                  <p className="text-white text-sm font-semibold mb-3 text-center" style={{fontFamily: 'Inter, sans-serif'}}>Usa el mismo archivo del módulo Búsqueda</p>
                  <p className="text-gray-400 text-xs text-center" style={{fontFamily: 'Inter, sans-serif'}}>Columnas: UPC, SKU, Descripción, Existencia, Precio</p>
                </motion.div>
              </motion.div>
            </div>
          </div>
        );
      }

      // Vista de inventario
      return (
        <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
          {/* Header Principal */}
          <motion.header
            initial={{ y: -100 }}
            animate={{ y: 0 }}
            className="bg-gradient-to-r from-od-red to-od-red-dark text-white shadow-lg sticky top-0 z-50"
          >
            <div className="container mx-auto px-4 md:px-6 py-3 md:py-4">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div className="flex items-center space-x-3 md:space-x-4">
                  <button
                    onClick={() => setFileLoaded(false)}
                    className="px-3 md:px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl transition-all"
                  >
                    <i className="fas fa-arrow-left mr-1 md:mr-2"></i>
                    <span className="hidden sm:inline">Volver</span>
                  </button>
                  <div>
                    <h1 className="text-lg md:text-2xl font-bold" style={{fontFamily: 'Inter, sans-serif'}}>Conteo Cíclico</h1>
                    <p className="text-xs md:text-sm text-red-100 truncate max-w-[120px] md:max-w-none" style={{fontFamily: 'Inter, sans-serif'}}>{fileName}</p>
                  </div>
                </div>
                
                <div className="flex items-center space-x-2 md:space-x-3 flex-wrap">
                  {hasChanges && (
                    <motion.button
                      initial={{ scale: 0 }}
                      animate={{ scale: 1 }}
                      onClick={exportExcel}
                      className="px-4 py-2 bg-green-500 hover:bg-green-600 rounded-xl font-semibold transition-all pulse-btn"
                    >
                      <i className="fas fa-download mr-2"></i>
                      <span className="hidden sm:inline">Exportar</span>
                    </motion.button>
                  )}
                  
                  {/* User Info */}
                  <div className="hidden sm:flex items-center space-x-2 bg-white/10 rounded-xl px-3 py-2">
                    <div className="w-8 h-8 bg-white rounded-full flex items-center justify-center overflow-hidden">
                      <img 
                        src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" 
                        alt="Usuario"
                        className="w-full h-full object-cover"
                      />
                    </div>
                    <span className="text-sm font-medium" style={{fontFamily: 'Inter, sans-serif'}}>{userName}</span>
                  </div>
                  
                  <button
                    onClick={onLogout}
                    className="px-3 md:px-4 py-2 bg-white/20 hover:bg-white hover:text-od-red rounded-xl font-semibold transition-all"
                  >
                    <i className="fas fa-sign-out-alt"></i>
                    <span className="hidden sm:inline ml-2">Salir</span>
                  </button>
                </div>
              </div>
            </div>
          </motion.header>

          {/* Barra de Búsqueda Estilo Office Depot */}
          <motion.div
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            className="bg-od-red shadow-md"
          >
            <div className="container mx-auto px-4 md:px-6 py-4">
              <div className="flex items-center gap-4 md:gap-8">
                {/* Logo Office Depot - Sin punto */}
                <div className="hidden md:flex items-center flex-shrink-0">
                  <span className="text-2xl font-black text-white tracking-tight" style={{fontFamily: 'Inter, sans-serif'}}>Office</span>
                  <span className="text-2xl font-black text-white ml-1" style={{fontFamily: 'Arial Black, sans-serif'}}>DEPOT</span>
                </div>
                
                {/* Search Bar */}
                <div className="flex-1 relative">
                  <input
                    type="text"
                    value={searchTerm}
                    onChange={(e) => handleSearch(e.target.value)}
                    placeholder="*Buscar por UPC, SKU o descripción"
                    className="w-full px-5 md:px-6 py-3 md:py-4 text-base rounded-full shadow-lg border-0 focus:outline-none focus:ring-4 focus:ring-white/30 transition-all bg-white text-gray-700 placeholder-gray-400"
                    style={{fontFamily: 'Inter, sans-serif'}}
                  />
                  <button className="absolute right-2 top-1/2 transform -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center hover:bg-gray-100 transition-all border-2 border-od-red">
                    <i className="fas fa-search text-od-red text-lg md:text-xl"></i>
                  </button>
                </div>
              </div>
            </div>
          </motion.div>

          <div className="container mx-auto px-4 md:px-6 py-6 md:py-8">
            {/* Stats Bar y Dark Mode Toggle */}
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              className="flex flex-wrap items-center justify-between gap-3 mb-4 md:mb-6"
            >
              <div className="flex flex-wrap gap-3">
                <div className={`rounded-xl px-4 py-3 shadow-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                  <span className={`text-sm ${darkMode ? 'text-gray-300' : 'text-gray-600'}`} style={{fontFamily: 'Inter, sans-serif'}}>
                    Total: <strong className={darkMode ? 'text-white' : 'text-gray-800'}>{filteredData.length}</strong>
                  </span>
                </div>
                <div className={`rounded-xl px-4 py-3 shadow-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                  <span className={`text-sm ${darkMode ? 'text-gray-300' : 'text-gray-600'}`} style={{fontFamily: 'Inter, sans-serif'}}>
                    Contados: <strong className="text-blue-500">{filteredData.filter(i => i.total > 0).length}</strong>
                  </span>
                </div>
                <div className={`rounded-xl px-4 py-3 shadow-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                  <span className={`text-sm ${darkMode ? 'text-gray-300' : 'text-gray-600'}`} style={{fontFamily: 'Inter, sans-serif'}}>
                    Sobrantes: <strong className="text-green-500">{filteredData.filter(i => i.diferencia > 0).length}</strong>
                  </span>
                </div>
                <div className={`rounded-xl px-4 py-3 shadow-md ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                  <span className={`text-sm ${darkMode ? 'text-gray-300' : 'text-gray-600'}`} style={{fontFamily: 'Inter, sans-serif'}}>
                    Faltantes: <strong className="text-red-500">{filteredData.filter(i => i.diferencia < 0).length}</strong>
                  </span>
                </div>
              </div>
              
              {/* Dark/Light Mode Toggle */}
              <button
                onClick={() => setDarkMode(!darkMode)}
                className={`flex items-center gap-2 px-4 py-2 rounded-xl shadow-md transition-all ${
                  darkMode 
                    ? 'bg-gray-800 text-yellow-400 hover:bg-gray-700' 
                    : 'bg-white text-gray-700 hover:bg-gray-100'
                }`}
              >
                <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                <span className="text-sm font-medium" style={{fontFamily: 'Inter, sans-serif'}}>{darkMode ? 'Claro' : 'Oscuro'}</span>
              </button>
            </motion.div>

            {/* Table */}
            <motion.div
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              className={`rounded-2xl shadow-xl overflow-hidden ${darkMode ? 'bg-gray-800' : 'bg-white'}`}
            >
              <div className="overflow-x-auto">
                <table className="w-full" style={{fontFamily: 'Inter, sans-serif'}}>
                  <thead>
                    <tr className={darkMode ? 'bg-gray-700' : 'bg-gray-100'}>
                      <th className={`px-4 py-4 text-left text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>UPC</th>
                      <th className={`px-4 py-4 text-left text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>SKU</th>
                      <th className={`px-4 py-4 text-left text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>DESCRIPCIÓN</th>
                      <th className={`px-4 py-4 text-center text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>EXIST.</th>
                      <th className={`px-4 py-4 text-center text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>PRECIO</th>
                      <th className={`px-4 py-4 text-center text-sm font-semibold min-w-[280px] ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>CONTEO</th>
                      <th className={`px-4 py-4 text-center text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>TOTAL</th>
                      <th className={`px-4 py-4 text-center text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-600'}`}>DIF.</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredData.map((item, rowIndex) => (
                      <motion.tr
                        key={item.id}
                        initial={{ opacity: 0, x: -20 }}
                        animate={{ opacity: 1, x: 0 }}
                        transition={{ delay: Math.min(rowIndex * 0.02, 0.5) }}
                        className={`border-b transition-colors ${
                          darkMode 
                            ? 'border-gray-700 hover:bg-gray-700/50' 
                            : 'border-gray-200 hover:bg-gray-50'
                        }`}
                      >
                        <td className={`px-4 py-4 text-sm ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                          {item.upc || 'N/A'}
                        </td>
                        <td className={`px-4 py-4 text-sm ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                          {item.sku || 'N/A'}
                        </td>
                        <td className={`px-4 py-4 text-sm ${darkMode ? 'text-gray-100' : 'text-gray-800'}`}>
                          {item.descripcion || 'N/A'}
                        </td>
                        <td className={`px-4 py-4 text-center text-sm font-medium ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>
                          {item.existencia}
                        </td>
                        <td className={`px-4 py-4 text-center text-sm font-medium ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>
                          {formatPrice(item.precio)}
                        </td>
                        <td className="px-4 py-4">
                          <div className="space-y-2">
                            {item.ubicaciones.map((ub, ubIndex) => (
                              <div key={ubIndex} className="flex items-center space-x-2">
                                {ubIndex === 0 ? (
                                  <button
                                    onClick={() => addUbicacion(item.id)}
                                    className="w-8 h-8 bg-green-500 hover:bg-green-600 text-white rounded-full flex items-center justify-center transition-all flex-shrink-0"
                                  >
                                    <i className="fas fa-plus text-xs"></i>
                                  </button>
                                ) : (
                                  <div className="w-8 h-8 flex-shrink-0"></div>
                                )}
                                <input
                                  type="number"
                                  value={ub.cantidad}
                                  onChange={(e) => updateUbicacion(item.id, ubIndex, 'cantidad', e.target.value)}
                                  placeholder="Cant."
                                  className={`w-20 px-2 py-2 text-center text-sm border-2 rounded-lg focus:border-od-red focus:outline-none transition-all ${
                                    darkMode 
                                      ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400' 
                                      : 'bg-white border-gray-300 text-gray-700 placeholder-gray-400'
                                  }`}
                                  style={{fontFamily: 'Inter, sans-serif'}}
                                />
                                <input
                                  type="text"
                                  value={ub.ubicacion}
                                  onChange={(e) => updateUbicacion(item.id, ubIndex, 'ubicacion', e.target.value)}
                                  placeholder="Ubicación"
                                  className={`flex-1 min-w-[80px] px-2 py-2 text-sm border-2 rounded-lg focus:border-od-red focus:outline-none transition-all ${
                                    darkMode 
                                      ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400' 
                                      : 'bg-white border-gray-300 text-gray-700 placeholder-gray-400'
                                  }`}
                                  style={{fontFamily: 'Inter, sans-serif'}}
                                />
                                {(item.ubicaciones.length > 1 || ub.cantidad || ub.ubicacion) && (
                                  <button
                                    onClick={() => removeUbicacion(item.id, ubIndex)}
                                    className="w-7 h-7 bg-gray-400 hover:bg-red-500 text-white rounded-full flex items-center justify-center transition-all flex-shrink-0"
                                  >
                                    <i className="fas fa-times text-xs"></i>
                                  </button>
                                )}
                              </div>
                            ))}
                          </div>
                        </td>
                        <td className={`px-4 py-4 text-center text-sm font-semibold ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>
                          {item.total}
                        </td>
                        <td className={`px-4 py-4 text-center text-sm font-bold ${getDiferenciaColor(item.diferencia)}`}>
                          {formatDiferencia(item.diferencia)}
                        </td>
                      </motion.tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {filteredData.length === 0 && (
                <div className="p-8 text-center">
                  <i className={`fas fa-inbox text-6xl mb-4 ${darkMode ? 'text-gray-600' : 'text-gray-300'}`}></i>
                  <p className={`text-xl ${darkMode ? 'text-gray-400' : 'text-gray-500'}`} style={{fontFamily: 'Inter, sans-serif'}}>No hay datos para mostrar</p>
                </div>
              )}
            </motion.div>
          </div>
        </div>
      );
    };

    // ========== MAIN APP ==========
    const App = () => {
      const [currentView, setCurrentView] = useState("login");
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [userName, setUserName] = useState("");

      const handleLogin = (name) => {
        setIsAuthenticated(true);
        setUserName(name);
        setCurrentView("dashboard");
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setUserName("");
        setCurrentView("login");
      };

      const handleNavigate = (view) => {
        setCurrentView(view);
      };

      return (
        <AnimatePresence mode="wait">
          {currentView === "login" && (
            <motion.div
              key="login"
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              exit={{ opacity: 0 }}
            >
              <LoginView onLogin={handleLogin} />
            </motion.div>
          )}

          {currentView === "dashboard" && (
            <motion.div
              key="dashboard"
              initial={{ opacity: 0, x: 100 }}
              animate={{ opacity: 1, x: 0 }}
              exit={{ opacity: 0, x: -100 }}
            >
              <DashboardView onNavigate={handleNavigate} onLogout={handleLogout} userName={userName} />
            </motion.div>
          )}

          {currentView === "scanner" && (
            <motion.div
              key="scanner"
              initial={{ opacity: 0, x: 100 }}
              animate={{ opacity: 1, x: 0 }}
              exit={{ opacity: 0, x: -100 }}
            >
              <ScannerView onBack={() => handleNavigate("dashboard")} onLogout={handleLogout} userName={userName} />
            </motion.div>
          )}

          {currentView === "inventory" && (
            <motion.div
              key="inventory"
              initial={{ opacity: 0, x: 100 }}
              animate={{ opacity: 1, x: 0 }}
              exit={{ opacity: 0, x: -100 }}
            >
              <InventoryView onBack={() => handleNavigate("dashboard")} onLogout={handleLogout} userName={userName} />
            </motion.div>
          )}
        </AnimatePresence>
      );
    };

    // Render the app
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (error) {
      console.error("Error al cargar la aplicación:", error);
      document.getElementById('root').innerHTML = `
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); font-family: Inter, sans-serif;">
          <div style="color: #C8102E; font-size: 48px; margin-bottom: 20px;">⚠️</div>
          <h1 style="color: #fff; font-size: 24px; margin-bottom: 10px;">Error al cargar el sistema</h1>
          <p style="color: #aaa;">Por favor, verifica tu conexión a internet y recarga la página.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
